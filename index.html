<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<title>FIDS Bandara Luwuk</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>

.flight{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.logo{
height:28px;
}

</style>

</head>

<body>

<div class="header">
<div class="header-title">
✈ UPBU SYUKURAN A. AMIR LUWUK
</div>

<div class="header-time">
<div class="clock" id="clock">--:--:--</div>
<div class="date" id="date">--</div>
</div>
</div>


<div class="content">

<div class="panel">
<div class="panel-title">KEBERANGKATAN DOMESTIK</div>
<div class="table-wrap">
<table id="dep"></table>
</div>
</div>


<div class="panel">
<div class="panel-title">KEDATANGAN DOMESTIK</div>
<div class="table-wrap">
<table id="arr"></table>
</div>
</div>

</div>


<div class="footer">
© 2026 SYUKURAN AMINUDDIN AMIR AIRPORT | FLIGHT INFORMATION DISPLAY SYSTEM
</div>


<script>

const API_URL = "https://script.google.com/macros/s/AKfycby2PQGqkhXwJ-YZiTI7IK48ZCFPgCvDuIqJvTMJJvoIyVCYSwZ-e6caAqk_WGksaO1dyg/exec";


/* DATABASE LOGO MASKAPAI */

const airlineLogo = {

"AIR ASIA":"https://upload.wikimedia.org/wikipedia/commons/5/5e/AirAsia_New_Logo.svg",

"BATIK AIR":"https://upload.wikimedia.org/wikipedia/commons/7/7c/Batik_Air_logo.svg",

"SUSI AIR":"https://upload.wikimedia.org/wikipedia/id/3/3f/Susi_Air_logo.png",

"CITILINK":"https://upload.wikimedia.org/wikipedia/commons/5/5c/Citilink_logo.svg",

"WINGS AIR":"https://upload.wikimedia.org/wikipedia/commons/7/73/Wings_Air_logo.svg",

"GARUDA":"https://upload.wikimedia.org/wikipedia/commons/9/9f/Garuda_Indonesia_Logo.svg"

};


/* JAM REALTIME */

function updateClock(){

const now = new Date();

document.getElementById("clock").innerText =
now.toLocaleTimeString("id-ID",{hour12:false});

document.getElementById("date").innerText =
now.toLocaleDateString("id-ID",{
weekday:"long",
day:"2-digit",
month:"long",
year:"numeric"
});

}

setInterval(updateClock,1000);

updateClock();



/* LOAD DATA */

fetch(API_URL)

.then(res => res.json())

.then(data => {

const dep = document.getElementById("dep");

const arr = document.getElementById("arr");

dep.innerHTML=`
<tr>
<th>PENERBANGAN</th>
<th>TUJUAN</th>
<th>JADWAL</th>
<th>STATUS</th>
</tr>
`;

arr.innerHTML=`
<tr>
<th>PENERBANGAN</th>
<th>ASAL</th>
<th>JADWAL</th>
<th>STATUS</th>
</tr>
`;

data.forEach(f=>{

const statusClass=(f.status||"").toLowerCase();

const logo=airlineLogo[f.maskapai] || "";

const row=`

<tr>

<td class="flight">

<img src="${logo}" class="logo">

${f.flight || ""}

</td>

<td>${f.kota}</td>

<td>${f.jam}</td>

<td class="status ${statusClass}">${f.status}</td>

</tr>

`;

if(f.jenis==="keberangkatan") dep.innerHTML+=row;

if(f.jenis==="kedatangan") arr.innerHTML+=row;

});

})

.catch(err=>{

console.error(err);

});

</script>

</body>
</html>
